<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Harga</title>
    <meta name="referrer" content="no-referrer">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 20px;
            background-color: #f0f2f5;
            margin: 0;
            color: #333;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .search-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .input-wrapper {
            position: relative;
            width: 320px;
        }
        input[type="text"] {
            padding: 12px 45px 12px 16px;
            width: 100%;
            font-size: 15px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: #3b82f6;
        }
        .scan-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            transition: color 0.3s;
        }
        .scan-btn:hover {
            color: #3b82f6;
        }
        button.btn-search {
            padding: 12px 24px;
            font-size: 15px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s, transform 0.1s;
            font-family: 'Inter', sans-serif;
        }
        button.btn-search:hover {
            background-color: #2563eb;
        }
        button.btn-search:active {
            transform: scale(0.98);
        }
        .message {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 16px;
            width: 340px;
            height: 440px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
            transform: scale(0.85) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.active .card {
            transform: scale(1) translateY(0);
        }
        .btn-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #f1f5f9;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
            z-index: 10;
        }
        .btn-close:hover {
            background-color: #e2e8f0;
            color: #0f172a;
        }
        .card-image-container {
            width: 100%;
            height: 170px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .product-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
        }
        .card-plumd {
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            margin-top: 4px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow: hidden;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card-desc {
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.4;
            margin-bottom: 8px;
            text-align: center;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-price-container {
            margin-top: 0;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 4px;
            text-align: center;
        }
        .card-price-container::-webkit-scrollbar {
            width: 4px;
        }
        .card-price-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 4px;
        }
        .strike-price {
            text-decoration: line-through;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 2px;
            display: block;
        }
        .promo-price {
            color: #ef4444;
            font-weight: 800;
            font-size: 30px;
            display: block;
            line-height: 1.2;
        }
        .normal-price {
            font-size: 30px;
            font-weight: 800;
            color: #0f172a;
            display: block;
            line-height: 1.2;
        }
        .promo-badge {
            display: inline-block;
            background-color: #f59e0b;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            margin-top: 6px;
            line-height: 1.2;
        }
        
        .animated-nav-out .product-image,
        .animated-nav-out .card-plumd,
        .animated-nav-out .card-info {
            opacity: 0;
            transform: translateY(-10px);
        }
        
        .animated-nav-in .product-image,
        .animated-nav-in .card-plumd,
        .animated-nav-in .card-info {
            opacity: 0;
            transform: translateY(10px);
        }
        
        .pagination-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: #ffffff;
            padding: 8px 16px;
            border-radius: 50px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .pagination-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 700;
            background-color: #0f172a;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color 0.3s, opacity 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .pagination-btn:hover:not(:disabled) {
            background-color: #1e293b;
        }
        .pagination-btn:disabled {
            background-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
        }
        .page-info {
            font-size: 14px;
            font-weight: 700;
            color: #334155;
            min-width: 60px;
            text-align: center;
        }

        .scanner-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 2000;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            box-sizing: border-box;
        }
        .scanner-header {
            color: white;
            font-size: 18px;
            font-weight: 600;
            z-index: 2001;
        }
        .scanner-viewfinder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 160px;
            border: 3px solid #3b82f6;
            border-radius: 12px;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6);
            z-index: 2001;
            pointer-events: none;
        }
        .scanner-viewfinder::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 5px;
            right: 5px;
            height: 2px;
            background-color: #ef4444;
            box-shadow: 0 0 8px #ef4444;
            animation: scanLine 2s linear infinite;
        }
        @keyframes scanLine {
            0% { top: 5%; }
            50% { top: 95%; }
            100% { top: 5%; }
        }
        #scannerVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .btn-close-scanner {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            z-index: 2001;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            font-family: 'Inter', sans-serif;
        }
    </style>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>

    <h2>CEK HARGA PRODUK</h2>
    
    <div class="search-container">
        <div class="input-wrapper">
            <input type="text" id="keyword" placeholder="Ketik PLU/Barcode/Nama disini ...">
            <button class="scan-btn" onclick="startScanner()" title="Scan Barcode">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
            </button>
        </div>
        <button class="btn-search" onclick="searchData()">Cari</button>
    </div>

    <div id="statusMessage" class="message"></div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-wrapper">
            <div class="card" id="productCard">
                <button class="btn-close" onclick="closeModal()">×</button>
                <div class="card-image-container">
                    <img id="productImg" class="product-image" src="" alt="">
                </div>
                <div id="productPlumd" class="card-plumd"></div>
                <div class="card-info">
                    <div id="productDesc" class="card-desc"></div>
                    <div id="productPriceContainer" class="card-price-container"></div>
                </div>
            </div>
            
            <div class="pagination-container">
                <button id="btnPrev" class="pagination-btn" onclick="prevPage()">Prev</button>
                <span id="pageInfo" class="page-info"></span>
                <button id="btnNext" class="pagination-btn" onclick="nextPage()">Next</button>
            </div>
        </div>
    </div>

    <div id="scannerContainer" class="scanner-container">
        <div class="scanner-header">Arahkan Barcode ke Kamera</div>
        <div class="scanner-viewfinder"></div>
        <video id="scannerVideo"></video>
        <button class="btn-close-scanner" onclick="stopScanner()">Batal</button>
    </div>

    <script>
        const prodmastUrl = 'https://raw.githubusercontent.com/IndoMarc/database/refs/heads/main/UGD_PRODMAST.CSV';
        const barcodeUrl = 'https://raw.githubusercontent.com/IndoMarc/database/refs/heads/main/UGD_BARCODE.CSV';
        const promoUrl = 'https://raw.githubusercontent.com/IndoMarc/database/refs/heads/main/UGD_promo_matriks.CSV';
        
        let csvDataLines = [];
        let barcodeMap = new Map();
        let promoMap = new Map();
        let isDataLoaded = false;

        let searchResults = [];
        let currentPage = 0;
        let codeReader = null;

        async function loadAllData() {
            try {
                document.getElementById('statusMessage').textContent = 'Mengunduh data barcode...';
                const barcodeResponse = await fetch(barcodeUrl);
                if (!barcodeResponse.ok) throw new Error('Gagal mengambil data Barcode dari GitHub');
                const barcodeText = await barcodeResponse.text();
                parseBarcodeData(barcodeText);

                document.getElementById('statusMessage').textContent = 'Mengunduh data promo...';
                const promoResponse = await fetch(promoUrl);
                if (!promoResponse.ok) throw new Error('Gagal mengambil data Promo dari GitHub');
                const promoText = await promoResponse.text();
                parsePromoData(promoText);

                document.getElementById('statusMessage').textContent = 'Mengunduh data produk...';
                const prodmastResponse = await fetch(prodmastUrl);
                if (!prodmastResponse.ok) throw new Error('Gagal mengambil data Produk dari GitHub');
                const prodmastText = await prodmastResponse.text();
                csvDataLines = prodmastText.split(/\r?\n/);

                isDataLoaded = true;
                document.getElementById('statusMessage').textContent = 'Data berhasil di proses, Silakan lakukan pencarian ...';
            } catch (error) {
                document.getElementById('statusMessage').textContent = 'Error memuat data: ' + error.message;
            }
        }

        function parseBarcodeData(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length === 0) return;

            const headers = lines[0].split('|');
            const indexPlu = headers.indexOf('PLU');
            const indexBarcd = headers.indexOf('BARCD');

            if (indexPlu === -1 || indexBarcd === -1) return;

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const columns = line.split('|');
                const plu = columns[indexPlu] ? columns[indexPlu].trim() : '';
                const barcd = columns[indexBarcd] ? columns[indexBarcd].trim() : '';

                if (plu && barcd) {
                    if (!barcodeMap.has(plu)) {
                        barcodeMap.set(plu, []);
                    }
                    barcodeMap.get(plu).push(barcd);
                }
            }
        }

        function parsePromoData(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length === 0) return;

            const headers = lines[0].split('|');
            const indexItemSyarat = headers.indexOf('ITEMSYARATORI');
            const indexMekanisme = headers.indexOf('MEKANISME');
            const indexQtyMin = headers.indexOf('QTYSYARATMIN');
            const indexTglAwal = headers.indexOf('TANGGALAWAL');
            const indexTglAkhir = headers.indexOf('TANGGALAKHIR');
            const indexPotongan = headers.indexOf('POTONGANRPTARGET');

            if (indexItemSyarat === -1) return;

            const disallowedMechanisms = [
                "BELI ITEM HEMAT MINGGU INI",
                "BELI ITEM PROMO 4 HARI",
                "SETIAP PEMBELIAN"
            ];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const columns = line.split('|');
                let rawItem = columns[indexItemSyarat] ? columns[indexItemSyarat].trim() : '';
                
                if (!rawItem) continue;

                const qtyMin = parseInt(columns[indexQtyMin]) || 1;
                if (qtyMin > 1) continue;

                const mekanisme = columns[indexMekanisme] ? columns[indexMekanisme].trim() : '';
                const meksUpper = mekanisme.toUpperCase();
                
                let shouldSkip = false;
                for (const disallowed of disallowedMechanisms) {
                    if (meksUpper.startsWith(disallowed)) {
                        shouldSkip = true;
                        break;
                    }
                }
                if (shouldSkip) continue;

                if (meksUpper.startsWith("I_KUPON") || meksUpper.startsWith("BELI ITEM PALING MURAH SENILAI")) {
                    continue;
                }

                const tglAwalRaw = columns[indexTglAwal] ? columns[indexTglAwal].trim() : '';
                const tglAkhirRaw = columns[indexTglAkhir] ? columns[indexTglAkhir].trim() : '';
                
                let potonganRaw = columns[indexPotongan] ? columns[indexPotongan].trim() : '0';
                let potongan = parseFloat(potonganRaw.replace('!', '')) || 0;

                const tglAwal = parseDate(tglAwalRaw);
                const tglAkhir = parseDate(tglAkhirRaw);

                let matches = rawItem.match(/!PLU=([0-9]+)/g);
                if (matches) {
                    matches.forEach(matchStr => {
                        let plu = matchStr.replace('!PLU=', '').trim();
                        if (plu) {
                            if (!promoMap.has(plu)) {
                                promoMap.set(plu, []);
                            }
                            promoMap.get(plu).push({ mekanisme, qtyMin, tglAwal, tglAkhir, potongan });
                        }
                    });
                } else {
                    let plu = rawItem.replace('!PLU=', '').trim();
                    if (plu) {
                        if (!promoMap.has(plu)) {
                            promoMap.set(plu, []);
                        }
                        promoMap.get(plu).push({ mekanisme, qtyMin, tglAwal, tglAkhir, potongan });
                    }
                }
            }
        }

        function parseDate(dateStr) {
            if (!dateStr) return null;
            const parts = dateStr.split(' ');
            if (parts.length === 0) return null;
            const dateParts = parts[0].split('/');
            if (dateParts.length !== 3) return null;
            return new Date(dateParts[2], dateParts[1] - 1, dateParts[0]);
        }

        function getActivePromos(plu) {
            const promoList = promoMap.get(plu);
            if (!promoList) return [];

            const now = new Date();
            now.setHours(0,0,0,0);

            let validPromos = [];
            for (const promo of promoList) {
                let isValid = true;
                if (promo.tglAwal && now < promo.tglAwal) isValid = false;
                if (promo.tglAkhir && now > promo.tglAkhir) isValid = false;
                
                if (isValid && promo.potongan > 0) {
                    validPromos.push(promo);
                }
            }
            return validPromos;
        }

        async function searchData() {
            const inputField = document.getElementById('keyword');
            const keyword = inputField.value.trim().toLowerCase();
            const statusMessage = document.getElementById('statusMessage');

            searchResults = [];
            currentPage = 0;

            if (!keyword) {
                statusMessage.textContent = 'Silakan masukkan kata kunci terlebih dahulu ...';
                return;
            }

            if (!isDataLoaded) {
                statusMessage.textContent = 'Sedang memuat data, silakan tunggu ...';
                await loadAllData();
                if (!isDataLoaded) return;
            }

            statusMessage.textContent = 'Mencari data...';

            const headers = csvDataLines[0].split('|');
            const indexPlumd = headers.indexOf('PLUMD');
            const indexDesc2 = headers.indexOf('DESC2');
            const indexPrice = headers.indexOf('PRICE');

            if (indexPlumd === -1 || indexDesc2 === -1 || indexPrice === -1) {
                statusMessage.textContent = 'Kolom PLUMD, DESC2, atau PRICE tidak ditemukan pada struktur berkas.';
                return;
            }

            for (let i = 1; i < csvDataLines.length; i++) {
                const line = csvDataLines[i].trim();
                if (!line) continue;

                if (line.toLowerCase().includes(keyword)) {
                    const columns = line.split('|');
                    
                    const plumd = columns[indexPlumd] ? columns[indexPlumd].trim() : '';
                    const desc2 = columns[indexDesc2] ? columns[indexDesc2].trim() : '';
                    let rawPrice = columns[indexPrice] || '0';
                    
                    let cleanPrice = parseFloat(rawPrice.replace(/[^0-9.-]+/g, ''));
                    if (isNaN(cleanPrice)) cleanPrice = 0;

                    const activePromos = getActivePromos(plumd);

                    searchResults.push({
                        plumd: plumd,
                        desc2: desc2,
                        cleanPrice: cleanPrice,
                        activePromos: activePromos
                    });
                }
            }

            if (searchResults.length > 0) {
                statusMessage.textContent = `Ditemukan ${searchResults.length} data.`;
                inputField.value = '';
                openModal();
                renderCurrentCard();
            } else {
                statusMessage.textContent = 'Data tidak ditemukan.';
            }
        }

        function renderCurrentCard() {
            if (searchResults.length === 0) return;

            const item = searchResults[currentPage];
            const formatter = new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            });

            const imgElement = document.getElementById('productImg');
            imgElement.src = `https://cdn-klik.klikindomaret.com/klik-catalog/product/${item.plumd}_1.jpg`;
            imgElement.alt = item.desc2;
            imgElement.onerror = function() {
                this.src = 'https://placehold.co/250x250?text=Tidak+Ada+Gambar';
            };

            document.getElementById('productPlumd').textContent = item.plumd;
            document.getElementById('productDesc').textContent = item.desc2;

            const priceContainer = document.getElementById('productPriceContainer');
            priceContainer.innerHTML = '';

            let totalPotongan = 0;
            let mekanismeLabels = [];
            let displayPromo = false;
            
            if (item.activePromos.length > 0) {
                item.activePromos.forEach(p => {
                    mekanismeLabels.push(p.mekanisme);
                    if (!p.mekanisme.toUpperCase().startsWith("SETIAP PEMBELIAN")) {
                        totalPotongan += p.potongan;
                        displayPromo = true;
                    }
                });
            }

            if (displayPromo && totalPotongan > 0) {
                let promoPrice = item.cleanPrice - totalPotongan;
                if (promoPrice < 0) promoPrice = 0;

                const spanNormal = document.createElement('span');
                spanNormal.className = 'strike-price';
                spanNormal.textContent = formatter.format(item.cleanPrice);
                priceContainer.appendChild(spanNormal);

                const spanPromo = document.createElement('span');
                spanPromo.className = 'promo-price';
                spanPromo.textContent = formatter.format(promoPrice);
                priceContainer.appendChild(spanPromo);
            } else {
                const spanNormalOnly = document.createElement('span');
                spanNormalOnly.className = 'normal-price';
                spanNormalOnly.textContent = formatter.format(item.cleanPrice);
                priceContainer.appendChild(spanNormalOnly);
            }

            mekanismeLabels.forEach(lbl => {
                const badge = document.createElement('span');
                badge.className = 'promo-badge';
                badge.textContent = lbl;
                priceContainer.appendChild(badge);
                priceContainer.appendChild(document.createElement('br'));
            });

            document.getElementById('pageInfo').textContent = `${currentPage + 1} / ${searchResults.length}`;
            document.getElementById('btnPrev').disabled = (currentPage === 0);
            document.getElementById('btnNext').disabled = (currentPage === searchResults.length - 1);
        }

        function triggerNavAnimation(actionCallback) {
            const card = document.getElementById('productCard');
            card.classList.add('animated-nav-out');
            
            setTimeout(() => {
                actionCallback();
                card.classList.remove('animated-nav-out');
                card.classList.add('animated-nav-in');
                
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        card.classList.remove('animated-nav-in');
                    }, 50);
                });
            }, 200);
        }

        function prevPage() {
            if (currentPage > 0) {
                triggerNavAnimation(() => {
                    currentPage--;
                    renderCurrentCard();
                });
            }
        }

        function nextPage() {
            if (currentPage < searchResults.length - 1) {
                triggerNavAnimation(() => {
                    currentPage++;
                    renderCurrentCard();
                });
            }
        }

        function openModal() {
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        async function startScanner() {
            if (!isDataLoaded) {
                document.getElementById('statusMessage').textContent = 'Sedang memuat data , silakan tunggu ...';
                await loadAllData();
                if (!isDataLoaded) return;
            }

            document.getElementById('scannerContainer').style.display = 'flex';
            
            if (!codeReader) {
                codeReader = new ZXing.BrowserMultiFormatReader();
            }

            codeReader.decodeFromVideoDevice(null, 'scannerVideo', (result, err) => {
                if (result) {
                    document.getElementById('keyword').value = result.text;
                    stopScanner();
                    searchData();
                }
            }).catch(err => {
                console.error(err);
                alert("Gagal mengakses kamera: " + err.message);
                stopScanner();
            });
        }

        function stopScanner() {
            if (codeReader) {
                codeReader.reset();
            }
            document.getElementById('scannerContainer').style.display = 'none';
        }

        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        loadAllData();
    </script>

</body>
</html>
